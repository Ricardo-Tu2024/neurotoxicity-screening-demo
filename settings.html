<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="prefs.js"></script>
</head>
<body>
    <div class="settings-page app-shell--workspace">
        <header class="settings-topbar">
            <button type="button" class="back-link" id="settings-back" data-i18n="settings_back">返回</button>
            <h1 data-i18n="settings_title">设置</h1>
        </header>
        <main class="settings-main">
            <p class="settings-lead" data-i18n="settings_subtitle">主题与显示语言将保存在本机浏览器。</p>

            <section class="settings-block" id="block-theme" aria-labelledby="label-theme">
                <h2 id="label-theme" data-i18n="setting_theme">主题模式</h2>
                <div class="theme-options" role="radiogroup" aria-label="" id="theme-rg">
                    <label class="settings-option" id="opt-theme-dark"
                        ><input type="radio" name="nmi-theme" value="dark" id="r-dark" />
                        <span data-i18n="theme_dark">暗色</span></label
                    >
                    <label class="settings-option" id="opt-theme-light"
                        ><input type="radio" name="nmi-theme" value="light" id="r-light" />
                        <span data-i18n="theme_light">亮色</span></label
                    >
                </div>
            </section>

            <section class="settings-block" id="block-lang" aria-labelledby="label-lang">
                <h2 id="label-lang" data-i18n="setting_language">显示语言</h2>
                <div class="lang-options" role="radiogroup" id="lang-rg">
                    <label class="settings-option" id="opt-lang-zh"
                        ><input type="radio" name="nmi-lang" value="zh" id="r-zh" />
                        <span data-i18n="lang_zh">中文</span></label
                    >
                    <label class="settings-option" id="opt-lang-en"
                        ><input type="radio" name="nmi-lang" value="en" id="r-en" />
                        <span data-i18n="lang_en">English</span></label
                    >
                </div>
            </section>
        </main>
    </div>
    <script src="i18n.js?v=10"></script>
    <script src="settings.js"></script>
</body>
</html>
